name: three_as_complex
description: 3As Complex Maintenance Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  pinput: ^3.0.1          # OTP input boxes
  loading_animation_widget: ^1.2.0+4
  fluttertoast: ^8.2.5
  shimmer: ^3.0.0
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1           # Functional: Either<Failure, T>
  connectivity_plus: ^6.0.3
  url_strategy: ^0.2.0     # Web: removes # from URLs (path-based routing)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
